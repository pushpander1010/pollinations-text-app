<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Text Generator — Powered by Pollinations.ai</title>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface2: #23233a;
    --accent: #7c5cff;
    --accent-hover: #9b7eff;
    --text: #e8e8f0;
    --text-dim: #8888aa;
    --border: #2a2a40;
    --green: #4ade80;
    --red: #f87171;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(15,15,19,0.85);
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 20px;
    font-weight: 700;
  }
  .logo span { color: var(--accent); }
  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .badge {
    background: var(--surface2);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .user-info {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .user-info img {
    width: 24px;
    height: 24px;
    border-radius: 50%;
  }
  .user-info a { color: var(--accent); text-decoration: none; }
  .user-info a:hover { text-decoration: underline; }
  main {
    flex: 1;
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
    padding: 32px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .hero {
    text-align: center;
    margin-bottom: 8px;
  }
  .hero h1 {
    font-size: 32px;
    font-weight: 800;
    background: linear-gradient(135deg, #7c5cff, #5cf0ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .hero p { color: var(--text-dim); font-size: 15px; }
  .settings-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .setting-group { display: flex; flex-direction: column; gap: 6px; }
  .setting-group label {
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  select, input[type="text"] {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  select:focus, input[type="text"]:focus {
    border-color: var(--accent);
  }
  .prompt-area { position: relative; }
  .prompt-area textarea {
    width: 100%;
    min-height: 140px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 16px;
    border-radius: var(--radius);
    font-size: 15px;
    font-family: inherit;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.6;
  }
  .prompt-area textarea:focus { border-color: var(--accent); }
  .prompt-area textarea::placeholder { color: var(--text-dim); opacity: 0.6; }
  .actions {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  button.primary {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 12px 28px;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  button.primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
  button.primary:active { transform: translateY(0); }
  button.primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  button.secondary {
    background: var(--surface);
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 12px 20px;
    border-radius: var(--radius);
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  button.secondary:hover { border-color: var(--accent); color: var(--text); }
  button.login-btn {
    background: linear-gradient(135deg, #2ea043, #238636);
    color: #fff;
    border: none;
    padding: 12px 24px;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  button.login-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .output-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    min-height: 120px;
    white-space: pre-wrap;
    line-height: 1.7;
    font-size: 15px;
    position: relative;
    display: none;
  }
  .output-box.visible { display: block; }
  .output-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-dim);
  }
  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { border-color: var(--green); color: var(--green); }
  .error-box {
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: var(--radius);
    padding: 14px 16px;
    color: var(--red);
    font-size: 14px;
    display: none;
  }
  .error-box.visible { display: block; }
  .auth-prompt {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    text-align: center;
  }
  .auth-prompt h3 { margin-bottom: 8px; font-size: 18px; }
  .auth-prompt p { color: var(--text-dim); margin-bottom: 20px; font-size: 14px; }
  .history-section { margin-top: 20px; }
  .history-section h3 {
    font-size: 14px;
    color: var(--text-dim);
    margin-bottom: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .history-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .history-item:hover { border-color: var(--accent); }
  .history-item .prompt { font-size: 14px; margin-bottom: 4px; }
  .history-item .response-preview {
    font-size: 13px;
    color: var(--text-dim);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .history-item .history-meta {
    font-size: 11px;
    color: var(--text-dim);
    opacity: 0.6;
    margin-top: 6px;
  }
  @media (max-width: 600px) {
    .settings-row { grid-template-columns: 1fr; }
    .hero h1 { font-size: 24px; }
    main { padding: 20px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">✨ <span>Pollinations</span> Text</div>
  <div class="header-right">
    <div class="user-info" id="userInfo"></div>
    <div class="badge">BYOP Enabled</div>
  </div>
</header>

<main>
  <div class="hero">
    <h1>AI Text Generator</h1>
    <p>Generate stories, articles, code, and more — powered by Pollinations.ai</p>
  </div>

  <!-- Auth prompt shown when not logged in -->
  <div class="auth-prompt" id="authPrompt">
    <h3>🔑 Sign in with GitHub</h3>
    <p>Use your own Pollinations credits. Earn rewards when others use the app.</p>
    <button class="login-btn" onclick="loginWithPollinations()">
      <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      Continue with GitHub
    </button>
  </div>

  <!-- Main content (hidden until auth) -->
  <div id="mainContent" style="display:none;">
    <div class="settings-row">
      <div class="setting-group">
        <label>Model</label>
        <select id="modelSelect">
          <option value="openai">GPT-4o Mini (OpenAI)</option>
          <option value="openai-large">GPT-4o (OpenAI Large)</option>
          <option value="mistral">Mistral Small</option>
          <option value="command-r">Command R (Cohere)</option>
          <option value="gemma">Gemma 2 (Google)</option>
          <option value="llama-3.3-70b">Llama 3.3 70B</option>
          <option value="phi-4">Phi-4 (Microsoft)</option>
          <option value="deepseek-v3">DeepSeek V3</option>
          <option value="qwen-2.5-coder-32b">Qwen 2.5 Coder 32B</option>
        </select>
      </div>
      <div class="setting-group">
        <label>System Prompt (optional)</label>
        <input type="text" id="systemPrompt" placeholder="e.g. You are a helpful assistant" />
      </div>
    </div>

    <div class="prompt-area">
      <textarea id="promptInput" placeholder="What do you want to write?&#10;&#10;Examples:&#10;• Write a short story about a robot who discovers emotions&#10;• Explain quantum computing in simple terms&#10;• Write a professional email declining a meeting&#10;• Create a Python function to sort a linked list"></textarea>
    </div>

    <div class="actions">
      <button class="primary" id="generateBtn" onclick="generate()">
        <div class="spinner" id="spinner"></div>
        <span id="btnText">Generate</span>
      </button>
      <button class="secondary" onclick="clearAll()">Clear</button>
      <button class="secondary" onclick="logout()" style="margin-left:auto;">Sign Out</button>
    </div>

    <div class="error-box" id="errorBox"></div>

    <div class="output-box" id="outputBox">
      <div id="outputText"></div>
      <div class="output-meta" id="outputMeta" style="display:none;">
        <span id="outputStats"></span>
        <button class="copy-btn" onclick="copyOutput()">📋 Copy</button>
      </div>
    </div>

    <div class="history-section" id="historySection" style="display:none;">
      <h3>Recent Generations</h3>
      <div id="historyList"></div>
    </div>
  </div>
</main>

<script>
const API_BASE = 'https://gen.pollinations.ai';
const CLIENT_ID = 'pk_p48Py2V6GvG5IIn2';
const REDIRECT_URI = location.href.split('#')[0].split('?')[0];

// ── BYOP Auth ──────────────────────────────────────────
function loginWithPollinations() {
  const params = new URLSearchParams({
    redirect_uri: REDIRECT_URI,
    client_id: CLIENT_ID,
  });
  window.location.href = `https://enter.pollinations.ai/authorize?${params}`;
}

function handleRedirect() {
  const hash = location.hash;
  if (!hash || !hash.includes('api_key=')) return false;
  const params = new URLSearchParams(hash.slice(1));
  const apiKey = params.get('api_key');
  const error = params.get('error');
  if (error) {
    showError(`Auth failed: ${error}`);
    return true;
  }
  if (apiKey) {
    localStorage.setItem('pollinations_api_key', apiKey);
    history.replaceState(null, '', location.pathname);
    return true;
  }
  return false;
}

function getApiKey() {
  return localStorage.getItem('pollinations_api_key');
}

function logout() {
  localStorage.removeItem('pollinations_api_key');
  location.reload();
}

function showApp() {
  document.getElementById('authPrompt').style.display = 'none';
  document.getElementById('mainContent').style.display = 'flex';
  document.getElementById('mainContent').style.flexDirection = 'column';
  document.getElementById('mainContent').style.gap = '20px';
  document.getElementById('userInfo').innerHTML = '✅ Authenticated via Pollinations';
  loadUserInfo();
}

async function loadUserInfo() {
  const key = getApiKey();
  if (!key) return;
  try {
    const res = await fetch('https://enter.pollinations.ai/api/device/userinfo', {
      headers: { 'Authorization': `Bearer ${key}` }
    });
    if (res.ok) {
      const user = await res.json();
      const name = user.preferred_username || user.name || 'User';
      document.getElementById('userInfo').innerHTML =
        `<img src="${user.picture || ''}" alt="" onerror="this.style.display='none'"/> ${name}`;
    }
  } catch(e) {}
}

// ── Init ───────────────────────────────────────────────
handleRedirect();
if (getApiKey()) {
  showApp();
}

// ── History ────────────────────────────────────────────
let history_ = JSON.parse(localStorage.getItem('pt_history') || '[]');
if (getApiKey()) renderHistory();

// ── UI helpers ─────────────────────────────────────────
function setLoading(loading) {
  document.getElementById('generateBtn').disabled = loading;
  document.getElementById('spinner').style.display = loading ? 'block' : 'none';
  document.getElementById('btnText').textContent = loading ? 'Generating...' : 'Generate';
}

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = msg;
  el.classList.add('visible');
}

function hideError() {
  document.getElementById('errorBox').classList.remove('visible');
}

function showOutput(text, model) {
  document.getElementById('outputText').textContent = text;
  document.getElementById('outputBox').classList.add('visible');
  document.getElementById('outputMeta').style.display = 'flex';
  const words = text.split(/\s+/).length;
  document.getElementById('outputStats').textContent = `${model} • ${words} words • ${text.length} chars`;
}

// ── Generate ───────────────────────────────────────────
async function generate() {
  const prompt = document.getElementById('promptInput').value.trim();
  if (!prompt) { showError('Please enter a prompt.'); return; }

  const apiKey = getApiKey();
  if (!apiKey) { showError('Please sign in first.'); return; }

  hideError();
  setLoading(true);

  const model = document.getElementById('modelSelect').value;
  const systemPrompt = document.getElementById('systemPrompt').value.trim();
  const messages = [];
  if (systemPrompt) messages.push({ role: 'system', content: systemPrompt });
  messages.push({ role: 'user', content: prompt });

  try {
    const res = await fetch(`${API_BASE}/v1/chat/completions`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({ model, messages, stream: false })
    });

    if (!res.ok) {
      const err = await res.text();
      if (res.status === 401) { logout(); throw new Error('Session expired. Please sign in again.'); }
      throw new Error(`API error ${res.status}: ${err}`);
    }

    const data = await res.json();
    const content = data.choices?.[0]?.message?.content;
    if (!content) throw new Error('No content in response');

    showOutput(content, model);
    saveHistory(prompt, content, model);
  } catch (e) {
    showError(e.message || 'Something went wrong.');
  } finally {
    setLoading(false);
  }
}

function clearAll() {
  document.getElementById('promptInput').value = '';
  document.getElementById('systemPrompt').value = '';
  document.getElementById('outputBox').classList.remove('visible');
  document.getElementById('outputText').textContent = '';
  document.getElementById('outputMeta').style.display = 'none';
  hideError();
}

function copyOutput() {
  const text = document.getElementById('outputText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✅ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

function saveHistory(prompt, response, model) {
  history_.unshift({ prompt, response: response.substring(0, 200), model, time: Date.now() });
  if (history_.length > 10) history_ = history_.slice(0, 10);
  localStorage.setItem('pt_history', JSON.stringify(history_));
  renderHistory();
}

function renderHistory() {
  const section = document.getElementById('historySection');
  const list = document.getElementById('historyList');
  if (!history_.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  list.innerHTML = history_.map((h, i) => `
    <div class="history-item" onclick="loadHistory(${i})">
      <div class="prompt">${escHtml(h.prompt)}</div>
      <div class="response-preview">${escHtml(h.response)}…</div>
      <div class="history-meta">${h.model} • ${timeAgo(h.time)}</div>
    </div>
  `).join('');
}

function loadHistory(i) {
  document.getElementById('promptInput').value = history_[i].prompt;
  document.getElementById('modelSelect').value = history_[i].model;
  document.getElementById('outputText').textContent = history_[i].response;
  document.getElementById('outputBox').classList.add('visible');
  document.getElementById('outputMeta').style.display = 'flex';
  document.getElementById('outputStats').textContent = history_[i].model;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function timeAgo(ts) {
  const d = Math.floor((Date.now() - ts) / 1000);
  if (d < 60) return 'just now';
  if (d < 3600) return `${Math.floor(d/60)}m ago`;
  if (d < 86400) return `${Math.floor(d/3600)}h ago`;
  return `${Math.floor(d/86400)}d ago`;
}

document.getElementById('promptInput')?.addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) generate();
});
</script>

</body>
</html>
